<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply persisted theme synchronously to prevent FOUC.
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(t);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Corbin Langfeldt — Full Stack Developer & Software Engineering Student at MSOE. Portfolio showcasing projects, skills, and experience." />
    <meta name="theme-color" content="#10b981" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:wght@300..700&display=swap" rel="stylesheet" />
    <title>Corbin Langfeldt | Full Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
